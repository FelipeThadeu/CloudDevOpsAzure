---
# Service: ClusterIP para comunicação interna
# O Ingress é o único ponto de entrada externo
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: production
  labels:
    app: api
    app.kubernetes.io/name: api
    app.kubernetes.io/component: backend
  annotations:
    # Prometheus ServiceMonitor usa este annotation para descobrir o serviço
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
spec:
  type: ClusterIP
  selector:
    app: api
    tier: backend
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8080
    - name: metrics
      protocol: TCP
      port: 9090
      targetPort: 9090

---
# Ingress: expõe a API externamente via NGINX Ingress Controller
# Requer: ingress-nginx instalado no cluster
# Instalar:  helm install ingress-nginx ingress-nginx/ingress-nginx --namespace ingress-nginx --create-namespace
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-ingress
  namespace: production
  labels:
    app: api
    app.kubernetes.io/name: api
  annotations:
    # Ingress class
    kubernetes.io/ingress.class: "nginx"

    # TLS: redirecionar HTTP → HTTPS
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"

    # Tamanho máximo do body (útil para uploads)
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"

    # Timeouts
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"

    # Rate limiting (requests por segundo por IP)
    nginx.ingress.kubernetes.io/limit-rps: "50"
    nginx.ingress.kubernetes.io/limit-connections: "20"

    # CORS (ajustar allowedOrigins em produção)
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Authorization, Content-Type, Accept"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://app.example.com"

    # Security headers via snippet
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-XSS-Protection: 1; mode=block";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
      more_set_headers "Strict-Transport-Security: max-age=31536000; includeSubDomains";

spec:
  # TLS: certificado gerenciado pelo cert-manager
  # Instalar cert-manager: helm install cert-manager jetstack/cert-manager --namespace cert-manager --set installCRDs=true
  tls:
    - hosts:
        - api.example.com
      secretName: api-tls-cert   # Criado automaticamente pelo cert-manager

  rules:
    - host: api.example.com
      http:
        paths:
          # Rota principal da API
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-service
                port:
                  number: 80
          # Health check público (sem autenticação)
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: api-service
                port:
                  number: 80

---
# Certificate: cert-manager emite certificado TLS via Let's Encrypt
# Requer ClusterIssuer "letsencrypt-prod" configurado
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: api-tls-cert
  namespace: production
spec:
  secretName: api-tls-cert
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - api.example.com
