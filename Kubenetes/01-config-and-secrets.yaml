---
# ConfigMap: variáveis não-sensíveis da API
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-config
  namespace: production
  labels:
    app: api
    app.kubernetes.io/name: api
    app.kubernetes.io/version: v1
data:
  LOG_LEVEL: "info"
  ENVIRONMENT: "production"
  API_PORT: "8080"

  # Serviços internos
  WORKER_SERVICE_URL: "http://worker-service:9090"

  # Banco de dados (host/porta/nome são públicos; credenciais ficam no Secret)
  DATABASE_HOST: "postgres.database.azure.com"
  DATABASE_PORT: "5432"
  DATABASE_NAME: "app_db"

  # Timeouts e limites
  REQUEST_TIMEOUT_MS: "30000"
  CONNECTION_POOL_SIZE: "20"

  # Feature flags
  FEATURE_NEW_PRICING: "false"
  FEATURE_BETA_EXPORT: "false"

  # Configuração JSON montada como arquivo em /etc/config/app.config.json
  app.config.json: |
    {
      "features": {
        "newPricing": false,
        "betaExport": false
      },
      "limits": {
        "maxUploadSize": 104857600,
        "maxConcurrentRequests": 100
      },
      "caching": {
        "enabled": true,
        "ttlSeconds": 3600
      }
    }

---
# SecretProviderClass: integração com Azure Key Vault via CSI Driver
# Requer: addon key-vault-secrets-provider habilitado no AKS
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: api-keyvault-secrets
  namespace: production
  labels:
    app: api
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"           # Usa a Managed Identity do node pool
    keyvaultName: "kv-prod-app"            # Deve coincidir com var.keyvault_name
    tenantId: "<TENANT_ID>"                # az account show --query tenantId
    objects: |
      array:
        - |
          objectName: db-password
          objectType: secret
          objectAlias: DB_PASSWORD
        - |
          objectName: api-key
          objectType: secret
          objectAlias: API_KEY
        - |
          objectName: jwt-secret
          objectType: secret
          objectAlias: JWT_SECRET

  # Sincroniza segredos do Key Vault como Kubernetes Secret
  # (necessário para envFrom e volumeMounts do tipo secret)
  secretObjects:
    - secretName: api-keyvault-synced
      type: Opaque
      data:
        - objectName: DB_PASSWORD
          key: DB_PASSWORD
        - objectName: API_KEY
          key: API_KEY
        - objectName: JWT_SECRET
          key: JWT_SECRET

---
# Secret local (apenas para desenvolvimento / bootstrap)
# Em produção, use EXCLUSIVAMENTE o SecretProviderClass acima
apiVersion: v1
kind: Secret
metadata:
  name: api-secrets-dev
  namespace: production
  labels:
    app: api
    environment: development
  annotations:
    # Lembrete para NOT usar em produção
    note: "Dev-only. Production secrets come from Azure Key Vault."
type: Opaque
stringData:
  DB_PASSWORD: "ChangeMe123!@#"
  API_KEY: "secret-api-key-12345"
  JWT_SECRET: "jwt-secret-key-very-secure-change-in-prod"
